"$schema" = "https://starship.rs/config-schema.json"
scan_timeout = 100
command_timeout = 500
follow_symlinks = false
add_newline = false
palette = "custom"

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""
right_format = """$all"""

[directory]
style = "blue"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¯░ø "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "
"Others" = "¯¼▓ "

[username]
disabled = true
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = " $user "

[line_break]
disabled = true

[character]
disabled = false
success_symbol = "[¯×Ñ ](bold fg:green)"
error_symbol = "[Ô£ÿ ](bold fg:red)"
vimcmd_symbol = "[: ](bold fg:yellow)"

[package]
disabled = false
symbol = "¯¼®"

[time]
disabled = true
time_format = "%R"
format = "[[ ´É║ $time ](fg:yellow bg:sky)]($style)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(git config --get remote.origin.url 2>/dev/null)
case "$GIT_REMOTE" in
  *github*)   echo "´Éê " ;;
  *gitlab*)   echo "´èû " ;;
  *bitbucket*) echo "´à▒ " ;;
  *git*)      echo "´çÆ " ;;
  *)          echo "´çÆ " ;;
esac
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "[¯éÂ](surface0)´Éÿ "
style = "italic fg:mauve bg:surface0"
format = "  [$symbol$branch]($style)[¯é┤](surface0)"

# [git_status]
# MINIMAL git status
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "Ôçí${count} "
# behind   = "Ôçú${count} "
# diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count} "

[git_status]
format = "[$untracked$staged$modified$renamed$conflicted$ahead_behind ]($style)"
# options available for format
staged = "[+](green)"
modified = "[!](yellow)"
renamed = "[┬╗](blue)"
deleted = "[-](red)"
untracked = "[?](peach)"
stashed = "[Ôëí](lavender)"
conflicted = "[Ô£û](red bold)"

ahead = "[Ôçí${count}](teal)"
behind = "[Ôçú${count}](peach)"
diverged = "[ÔçòÔçí${ahead_count}Ôçú${behind_count}](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
[ "$(git rev-parse --git-common-dir)" != "$(git rev-parse --git-dir)" ] && echo "Ôøô "
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

