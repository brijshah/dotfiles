style = "maroon"

[kotlin]
symbol = "¯ÿ┤"
format = "[ $symbol( $version) ]($style)"

[haskell]
symbol = "¯ÿƒ"
format = "[ $symbol( $version) ]($style)"

[python]
symbol = "¯ÿå"
